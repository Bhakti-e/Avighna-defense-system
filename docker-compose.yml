version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: avighna-postgres
    environment:
      POSTGRES_DB: avighna
      POSTGRES_USER: avighna_user
      POSTGRES_PASSWORD: avighna_secure_password_change_in_production
      POSTGRES_INITDB_ARGS: "-E UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - avighna-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avighna_user -d avighna"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AVIGHNA Backend (FastAPI)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: avighna-backend
    environment:
      DATABASE_URL: postgresql://avighna_user:avighna_secure_password_change_in_production@postgres:5432/avighna
      USE_TIMESCALEDB: "true"
      ENABLE_SCAPY_MONITOR: "false"  # Disable in Docker (requires host network mode)
      SAFE_MODE: "true"
      GATEWAY_MODE: "false"
      CTI_ENABLED: "true"
      ML_ENABLED: "true"
      FORENSICS_ENABLED: "true"
    volumes:
      - ./backend:/app/backend
      - ./reports:/app/reports
      - ./backups:/app/backups
      - ./data:/app/data
    ports:
      - "8000:8000"
    networks:
      - avighna-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000

  # AVIGHNA Frontend (Next.js)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: avighna-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_WS_URL: ws://localhost:8000
    ports:
      - "3000:3000"
    networks:
      - avighna-network
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  avighna-network:
    driver: bridge
